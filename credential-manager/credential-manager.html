<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultGrid — Credential Manager</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="credential-manager.css">
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon"><span class="material-symbols-outlined" style="font-size:inherit; vertical-align:text-bottom">lock</span></div>
        VaultGrid
      </div>
      <div class="search-wrap">
        <span class="icon"><span class="material-symbols-outlined" style="font-size:inherit; vertical-align:text-bottom">search</span></span>
        <input type="text" id="global-search" placeholder="Search projects, users, URLs…">
      </div>
    </div>

    <div class="sidebar-section-label">
      Projects
      <button class="icon-btn" id="add-project-btn" title="New Project" style="color:var(--accent)"><span class="material-symbols-outlined" style="font-size:inherit; vertical-align:text-bottom">add</span></button>
    </div>

    <div id="project-list"></div>

    <div class="sidebar-footer">
      <button class="sidebar-btn" id="export-btn"><span class="material-symbols-outlined" style="font-size:inherit; vertical-align:text-bottom">upload</span> Export Data</button>
      <button class="sidebar-btn" id="import-btn"><span class="material-symbols-outlined" style="font-size:inherit; vertical-align:text-bottom">download</span> Import Data</button>
      <input type="file" id="import-file" accept=".json" style="display:none">
    </div>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <!-- Empty state -->
    <div id="empty-state" style="display:flex;">
      <div class="empty-icon"><span class="material-symbols-outlined" style="font-size:inherit; vertical-align:text-bottom">folder_open</span></div>
      <div class="empty-title">No project selected</div>
      <div class="empty-sub">Pick a project from the sidebar or create one to get started.</div>
      <button class="btn btn-primary" id="empty-add-btn">+ New Project</button>
    </div>

    <!-- Project view -->
    <div id="project-view">
      <div class="project-header">
        <div class="project-header-left">
          <div class="project-title" id="view-project-name"></div>
          <div class="project-desc" id="view-project-desc"></div>
          <div class="project-meta">
            <span>Created <span id="view-project-date"></span></span>
          </div>
        </div>
        <div class="project-header-actions">
          <button class="btn btn-ghost" id="edit-project-btn"><span class="material-symbols-outlined" style="font-size:inherit; vertical-align:text-bottom">edit</span> Edit</button>
          <button class="btn btn-danger" id="delete-project-btn"><span class="material-symbols-outlined" style="font-size:inherit; vertical-align:text-bottom">delete</span> Delete</button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="environments">
          <span class="material-symbols-outlined" style="font-size:inherit; vertical-align:text-bottom">language</span> Environments <span class="tab-count" id="env-tab-count">0</span>
        </button>
        <button class="tab" data-tab="credentials">
          <span class="material-symbols-outlined" style="font-size:inherit; vertical-align:text-bottom">vpn_key</span> Credentials <span class="tab-count" id="cred-tab-count">0</span>
        </button>
        <button class="tab" data-tab="github">
          <span class="material-symbols-outlined" style="font-size:inherit; vertical-align:text-bottom">code</span> GitHub <span class="tab-count" id="github-tab-count">0</span>
        </button>
        <button class="tab" data-tab="docs">
          <span class="material-symbols-outlined" style="font-size:inherit; vertical-align:text-bottom">description</span> Docs <span class="tab-count" id="docs-tab-count">0</span>
        </button>
      </div>

      <!-- Environments Tab -->
      <div class="tab-content active" id="tab-environments">
        <div class="section-header">
          <div class="section-title">Environments</div>
          <button class="btn btn-primary" id="add-env-btn">+ Add Environment</button>
        </div>
        <div class="env-grid" id="env-grid"></div>
      </div>

      <!-- Credentials Tab -->
      <div class="tab-content" id="tab-credentials">
        <div class="section-header">
          <div class="section-title">Credentials</div>
          <button class="btn btn-primary" id="add-cred-btn">+ Add Credential</button>
        </div>
        <div class="cred-filters">
          <input type="text" class="filter-input" id="cred-search" placeholder="Search username…" style="flex:1;min-width:160px">
          <select class="filter-input" id="cred-env-filter" style="min-width:140px"></select>
        </div>
        <div class="cred-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Username / Email</th>
                <th>Password</th>
                <th>Environment</th>
                <th>Notes</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="cred-tbody"></tbody>
          </table>
          <div class="empty-table" id="cred-empty" style="display:none">No credentials yet. Add one above.</div>
        </div>
      </div>
      <!-- GitHub Tab -->
      <div class="tab-content" id="tab-github">
        <div class="section-header">
          <div class="section-title">GitHub Repositories</div>
          <button class="btn btn-primary" id="add-github-btn">+ Add Repo</button>
        </div>
        <div class="links-grid" id="github-grid"></div>
      </div>

      <!-- Docs Tab -->
      <div class="tab-content" id="tab-docs">
        <div class="section-header">
          <div class="section-title">Document Links</div>
          <button class="btn btn-primary" id="add-doc-btn">+ Add Doc</button>
        </div>
        <div class="links-grid" id="docs-grid"></div>
      </div>
    </div>
  </main>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<!-- MODALS rendered dynamically -->

<script src="credential-manager.js"></script>
</body>
</html>
